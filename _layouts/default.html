<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
<meta name="keywords" content="{{ site.keywords }}">
<meta name="description" content="{{ site.description }}">
<title>{% if page.title%}{{ page.title }}{% else %}{{ site.name }}{% endif %}</title>
<link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
    color-scheme: light dark;
    --bg: #fbfbfa;
    --fg: #111;
    --muted: #666;
    --faint: #999;
    --line: #e5e5e2;
    --soft: #f6f6f4;
    --accent: #7f8a94;
    --sans: "Inter", "Helvetica Neue", Helvetica, Arial, -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    --mono: "SF Mono";
    --mono-fallback: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", ui-monospace, monospace;
}
* { box-sizing: border-box; }
html, body, div, h1, p, a { margin: 0; padding: 0; border: 0; font-size: 100%; vertical-align: baseline; }
html { min-height: 100%; -webkit-text-size-adjust: 100%; }
body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.72;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
}
div {
    position: fixed;
    top: 50%;
    right: clamp(28px, 12vw, 180px);
    width: min(480px, calc(100vw - 56px));
    transform: translateY(-50%);
    text-align: right;
}
h1 {
    margin-bottom: 34px;
    color: var(--fg);
    font-size: clamp(2.6rem, 7.2vw, 5.9rem);
    font-weight: 300;
    line-height: .96;
    letter-spacing: -.055em;
}
h1::after {
    content: " /";
    color: var(--accent);
    font-weight: 200;
}
p {
    margin-top: 9px;
    color: var(--muted);
    font-size: .9375rem;
    font-weight: 400;
    line-height: 1.5;
}
a {
    display: inline-block;
    margin-left: 14px;
    color: inherit;
    font-family: var(--mono), var(--mono-fallback);
    font-size: .8125rem;
    font-weight: 500;
    letter-spacing: .04em;
    text-decoration: none;
    text-decoration-thickness: .08em;
    text-underline-offset: .18em;
    transition: color .16s ease;
}
p:nth-child(2) a {
    color: var(--faint);
}
a:hover,
a:focus {
    color: var(--accent);
    text-decoration: underline;
}
@media screen and (min-width: 1000px) {
    div::before {
        content: "";
        display: block;
        width: 72px;
        height: 1px;
        margin: 0 0 28px auto;
        background: var(--line);
    }
}
@media screen and (max-width: 720px) {
    body {
        display: flex;
        align-items: center;
        min-height: 100vh;
        padding: 28px;
    }
    div {
        position: static;
        width: 100%;
        transform: none;
        text-align: left;
    }
    h1 {
        margin-bottom: 30px;
        font-size: clamp(2.7rem, 17vw, 4.8rem);
    }
    p {
        margin-top: 10px;
    }
    a {
        margin-right: 14px;
        margin-left: 0;
    }
}
@media screen and (prefers-color-scheme: dark) {
    :root {
        --bg: #0b0b0a;
        --fg: #eeeeea;
        --muted: #a6a6a0;
        --faint: #777771;
        --line: #2a2a27;
        --soft: #151512;
        --accent: #eeeeea;
    }
}
</style>
</head>
<body>
{{ content }}
</body>
</html>
