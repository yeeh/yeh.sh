<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
<meta name="keywords" content="{{ site.keywords }}">
<meta name="description" content="{{ site.description }}">
<title>{% if page.title%}{{ page.title }}{% else %}{{ site.name }}{% endif %}</title>
<link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/favicon.ico">
<style>
:root {
    color-scheme: light dark;
    --bg: #fff;
    --fg: #111;
    --muted: #666;
    --faint: #999;
    --line: #e5e5e5;
    --soft: #f6f6f6;
    --sans: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}
* { box-sizing: border-box; }
html, body, div, h1, p, a { margin: 0; padding: 0; border: 0; font-size: 100%; vertical-align: baseline; }
html { min-height: 100%; -webkit-text-size-adjust: 100%; }
body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
}
div {
    position: fixed;
    top: 50%;
    right: clamp(28px, 12vw, 180px);
    width: min(480px, calc(100vw - 56px));
    transform: translateY(-50%);
    text-align: right;
}
h1 {
    margin-bottom: 34px;
    color: var(--fg);
    font-size: clamp(2.4rem, 7vw, 5.6rem);
    font-weight: 620;
    line-height: .95;
    letter-spacing: -.07em;
}
h1::after {
    content: " /";
    color: var(--faint);
    font-weight: 400;
}
p {
    margin-top: 12px;
    color: var(--muted);
    font-size: .95rem;
}
a {
    display: inline-block;
    margin-left: 14px;
    color: inherit;
    font-weight: 520;
    text-decoration: none;
    text-underline-offset: .18em;
    transition: color .16s ease, border-color .16s ease;
}
p:nth-child(2) a {
    color: var(--faint);
}
a:hover,
a:focus {
    color: var(--fg);
    text-decoration: underline;
}
@media screen and (min-width: 1000px) {
    div::before {
        content: "";
        display: block;
        width: 72px;
        height: 1px;
        margin: 0 0 28px auto;
        background: var(--line);
    }
}
@media screen and (max-width: 720px) {
    body {
        display: flex;
        align-items: center;
        min-height: 100vh;
        padding: 28px;
    }
    div {
        position: static;
        width: 100%;
        transform: none;
        text-align: left;
    }
    h1 {
        margin-bottom: 30px;
        font-size: clamp(2.7rem, 17vw, 4.8rem);
    }
    p {
        margin-top: 10px;
    }
    a {
        margin-right: 14px;
        margin-left: 0;
    }
}
@media screen and (prefers-color-scheme: dark) {
    :root {
        --bg: #050505;
        --fg: #f2f2f2;
        --muted: #9a9a9a;
        --faint: #777;
        --line: #242424;
        --soft: #111;
    }
}
</style>
</head>
<body>
{{ content }}
</body>
</html>
